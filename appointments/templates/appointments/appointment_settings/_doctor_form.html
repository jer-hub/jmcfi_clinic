<form method="POST"
      action="{% url 'appointments:edit_appointment_type_default' type_key=item.type_key %}"
      class="flex items-center gap-3"
      x-data="doctorDropdown({{ item.doctor_count }})"
      x-init="init()"
      hx-post="{% url 'appointments:edit_appointment_type_default' type_key=item.type_key %}"
      hx-target="#status-{{ item.type_key }}"
      hx-swap="innerHTML"
      hx-indicator=".form-spinner-{{ item.type_key }}">
    {% csrf_token %}
    <input type="hidden" name="appointment_type" value="{{ item.type_key }}">

    <div class="relative flex-1 min-w-0"
         x-ref="dropdownRoot"
         @keydown.escape.window="isOpen && closeDropdown()">

        <!-- Trigger -->
        <button type="button"
                @click="toggleDropdown()"
                :aria-expanded="isOpen"
                aria-haspopup="listbox"
                class="w-full flex items-center justify-between px-3 py-2 bg-white border border-gray-300 rounded-lg shadow-sm text-sm text-gray-700 hover:border-primary-400 focus:outline-none focus:ring-2 focus:ring-primary-300 transition-all duration-150">
            <span class="flex items-center gap-2 min-w-0">
                <i class="fas fa-user-doctor text-gray-400 flex-shrink-0" aria-hidden="true"></i>
                <span class="truncate" x-text="selectedLabel()"></span>
            </span>
            <i class="fas fa-chevron-down text-gray-400 flex-shrink-0 transition-transform duration-200 ml-2 text-xs"
               :class="isOpen ? 'rotate-180' : ''"
               aria-hidden="true"></i>
        </button>

        <!-- Dropdown Panel -->
        <div x-show="isOpen"
             x-cloak
             @click.stop
             x-transition:enter="transition ease-out duration-150"
             x-transition:enter-start="opacity-0 translate-y-1"
             x-transition:enter-end="opacity-100 translate-y-0"
             x-transition:leave="transition ease-in duration-100"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 translate-y-1"
             class="absolute left-0 right-0 sm:right-auto top-full z-50 mt-1.5 sm:w-72 bg-white border border-gray-200 rounded-xl shadow-xl overflow-hidden flex flex-col">

            <!-- Search -->
            <div class="p-2 border-b border-gray-100 bg-white">
                <div class="relative">
                    <i class="fas fa-magnifying-glass absolute left-2.5 top-2.5 text-gray-400 text-xs" aria-hidden="true"></i>
                    <input type="text"
                           x-model="search"
                           placeholder="Search doctors..."
                           autocomplete="off"
                           class="w-full pl-7 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-primary-400 bg-gray-50">
                </div>
            </div>

            <!-- Select All / Clear -->
            <div class="flex items-center justify-between px-3 py-1.5 bg-gray-50 border-b border-gray-100">
                <button type="button" @click="selectAll()" class="text-xs font-semibold text-primary-600 hover:text-primary-800 transition-colors">Select all</button>
                <span class="text-gray-300 text-xs" aria-hidden="true">|</span>
                <button type="button" @click="clearAll()" class="text-xs font-semibold text-gray-500 hover:text-gray-700 transition-colors">Clear</button>
            </div>

            <!-- Checkbox list -->
            <ul class="doctor-cb-list max-h-52 overflow-y-auto py-1" role="listbox">
                {% for checkbox in item.form.assigned_doctors %}
                <li x-show="matchesSearch($el.dataset.searchLabel)"
                    data-search-label="{{ checkbox.choice_label|escapejs }}"
                    class="group">
                    <label for="{{ checkbox.id_for_label }}"
                           class="flex items-center gap-3 px-3 py-2.5 cursor-pointer hover:bg-primary-50 transition-colors duration-100 group-has-[:checked]:bg-primary-50">
                        {{ checkbox.tag }}
                        <span class="text-sm text-gray-700 group-has-[:checked]:text-primary-800 group-has-[:checked]:font-medium leading-snug">
                            {{ checkbox.choice_label }}
                        </span>
                    </label>
                </li>
                {% empty %}
                <li class="px-3 py-4 text-center text-sm text-gray-400 italic">No doctors available.</li>
                {% endfor %}
            </ul>

            <!-- Save / Cancel footer -->
            <div class="sticky bottom-0 border-t border-gray-100 bg-gray-50 px-3 py-2 flex items-center justify-between gap-2">
                <span class="text-xs text-amber-600 font-medium" x-show="dirty" x-cloak>
                    <i class="fas fa-circle-dot text-[10px]" aria-hidden="true"></i> Unsaved changes
                </span>
                <span class="text-xs text-gray-400" x-show="!dirty">No changes</span>
                <div class="flex items-center gap-2">
                    <button type="button"
                            @click="cancel()"
                            class="px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-gray-800 transition-colors">
                        Cancel
                    </button>
                    <button type="button"
                            @click="save()"
                            :disabled="!dirty"
                            class="px-3 py-1.5 text-xs font-medium text-white bg-primary-600 rounded-lg hover:bg-primary-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors">
                        <i class="fas fa-check mr-1" aria-hidden="true"></i> Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <span class="form-spinner-{{ item.type_key }} htmx-indicator ml-2 inline-flex items-center gap-1">
        <i class="fas fa-spinner fa-spin text-primary-600 text-xs" aria-hidden="true"></i>
    </span>

</form>
