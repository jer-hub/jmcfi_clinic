<script>
window.doctorDropdown = function() {
    return {
        open: false,
        search: '',
        count: 0,
        originalChecked: [],
        dirty: false,

        init() {
            this.captureState();
        },

        captureState() {
            this.originalChecked = this._getCheckedValues();
            this.updateCount();
            this.dirty = false;
        },

        _getCheckedValues() {
            return [...this.$root.querySelectorAll('input[type="checkbox"]:checked')].map(cb => cb.value);
        },

        _getCheckboxes() {
            return this.$root.querySelectorAll('input[type="checkbox"]');
        },

        updateCount() {
            this.count = this.$root.querySelectorAll('input[type="checkbox"]:checked').length;
            const current = this._getCheckedValues();
            this.dirty = (
                current.length !== this.originalChecked.length ||
                current.some(v => !this.originalChecked.includes(v))
            );
        },

        selectedLabel() {
            if (this.count === 0) return 'All doctors available';
            if (this.count === 1) return '1 doctor assigned';
            return this.count + ' doctors assigned';
        },

        save() {
            this.open = false;
            this.search = '';
            const form = this.$root;
            htmx.trigger(form, 'submit');
            this.captureState();
        },

        cancel() {
            this._getCheckboxes().forEach(cb => {
                cb.checked = this.originalChecked.includes(cb.value);
            });
            this.updateCount();
            this.open = false;
            this.search = '';
        },

        selectAll() {
            this._getCheckboxes().forEach(cb => { cb.checked = true; });
            this.updateCount();
        },

        clearAll() {
            this._getCheckboxes().forEach(cb => { cb.checked = false; });
            this.updateCount();
        },
    }
};
</script>
