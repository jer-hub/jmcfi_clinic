<div class="flex-shrink-0 h-8 w-8 flex items-center justify-center rounded-full
    {% if type_key == 'consultation' %}bg-blue-100
    {% elif type_key == 'checkup' %}bg-green-100
    {% elif type_key == 'vaccination' %}bg-purple-100
    {% elif type_key == 'emergency' %}bg-red-100
    {% elif type_key == 'dental' %}bg-yellow-100
    {% else %}bg-orange-100{% endif %}">
    <i class="fas
        {% if type_key == 'consultation' %}fa-stethoscope text-blue-600
        {% elif type_key == 'checkup' %}fa-clipboard-check text-green-600
        {% elif type_key == 'vaccination' %}fa-syringe text-purple-600
        {% elif type_key == 'emergency' %}fa-truck-medical text-red-600
        {% elif type_key == 'dental' %}fa-tooth text-yellow-600
        {% else %}fa-calendar-check text-orange-600{% endif %}
        text-sm"></i>
</div>
