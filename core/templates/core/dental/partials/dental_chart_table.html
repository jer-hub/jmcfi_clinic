<div id="dental-chart-container">
{% if dental_chart %}
<div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm">
    <table class="min-w-full divide-y divide-gray-200" id="dental-chart-table">
        <thead class="bg-gradient-to-r from-primary-50 to-primary-100">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Tooth #</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Type</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Condition</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Notes</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-700 uppercase tracking-wider">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for tooth in dental_chart %}
            <tr class="hover:bg-primary-50 transition-colors duration-150">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-semibold text-gray-900">{{ tooth.tooth_number }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ tooth.get_tooth_type_display }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">{{ tooth.get_condition_display }}</td>
                <td class="px-6 py-4 text-sm text-gray-700">{{ tooth.notes|truncatewords:10 }}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <div class="flex items-center gap-2">
                        <button type="button" onclick="editTooth({{ tooth.tooth_number }}, '{{ tooth.tooth_type }}', '{{ tooth.condition }}', '{{ tooth.notes|escapejs }}')"
                            class="inline-flex items-center px-3 py-1.5 bg-primary-600 text-white text-xs font-medium rounded-lg hover:bg-primary-700 transition-colors shadow-sm">
                            <i class="fas fa-edit mr-1"></i> Edit
                        </button>
                        <button type="button"
                            onclick="confirmDeleteTooth({{ dental_record.id }}, {{ tooth.id }}, {{ tooth.tooth_number }})"
                            class="inline-flex items-center px-3 py-1.5 bg-red-600 text-white text-xs font-medium rounded-lg hover:bg-red-700 transition-colors shadow-sm">
                            <i class="fas fa-trash mr-1"></i> Delete
                        </button>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="text-center py-12 bg-gray-50 rounded-lg border border-gray-200" id="dental-chart-empty">
    <i class="fas fa-teeth text-4xl text-gray-300 mb-3"></i>
    <p class="text-gray-500">No teeth recorded in chart yet.</p>
</div>
{% endif %}
</div>
