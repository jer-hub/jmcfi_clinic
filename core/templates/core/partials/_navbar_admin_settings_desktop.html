{% comment %} Admin Settings dropdown (lg+). Expects nav_active. {% endcomment %}
<div class="relative site-nav-dropdown-host" x-data="{ open: false, routeActive: {% if nav_active.settings_menu %}true{% else %}false{% endif %} }" @click.outside="open = false" @keydown.escape.window="open && (open = false)">
  <button type="button"
    id="nav-trigger-settings-desktop"
    class="nav-link"
    @click="open = !open"
    x-bind:class="{ active: open || routeActive }"
    aria-haspopup="true"
    :aria-expanded="open.toString()"
    aria-controls="nav-menu-settings-desktop">
    Settings
    <i class="fas fa-chevron-down text-xs shrink-0 transition-transform duration-200 ease-out" :class="open ? 'rotate-180' : ''"></i>
  </button>
  <div id="nav-menu-settings-desktop"
    x-show="open"
    x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-1"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-1"
    role="region"
    aria-labelledby="nav-trigger-settings-desktop"
    class="absolute left-0 top-full z-50 mt-2 w-72 origin-top-left rounded-xl border border-gray-200 bg-white shadow-lg p-2">
    <a href="{% url 'core:settings_hub' %}" class="dropdown-item">System Settings</a>
    <a href="{% url 'core:settings_clinic' %}" class="dropdown-item">Clinic Settings</a>
    <a href="{% url 'core:settings_roles' %}" class="dropdown-item">Role Settings</a>
    <a href="{% url 'core:settings_audit' %}" class="dropdown-item">Settings Audit Log</a>
    <a href="{% url 'core:clinical_access_log' %}" class="dropdown-item">Clinical Access Log</a>
    <a href="{% url 'appointments:appointment_type_settings' %}" class="dropdown-item">Appointment Settings</a>
  </div>
</div>
