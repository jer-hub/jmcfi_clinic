{% comment %} Admin Settings accordion (mobile). Expects nav_active. {% endcomment %}
<button type="button"
  id="nav-mobile-settings-trigger"
  class="mobile-link w-full text-left flex items-center justify-between {% if nav_active.settings_menu %}active{% endif %}"
  @click="mobilePanel = mobilePanel === 'settings' ? '' : 'settings'"
  :class="mobilePanel === 'settings' ? 'active' : ''"
  :aria-expanded="(mobilePanel === 'settings').toString()"
  aria-controls="nav-mobile-settings-panel">
  <span>Settings</span>
  <i class="fas fa-chevron-down text-xs shrink-0 transition-transform duration-200 ease-out" :class="mobilePanel === 'settings' ? 'rotate-180' : ''"></i>
</button>
<div id="nav-mobile-settings-panel"
  x-show="mobilePanel === 'settings'"
  x-cloak
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0 -translate-y-1"
  x-transition:enter-end="opacity-100 translate-y-0"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100 translate-y-0"
  x-transition:leave-end="opacity-0 -translate-y-1"
  role="region"
  aria-labelledby="nav-mobile-settings-trigger"
  class="overflow-hidden px-2 pb-2">
  <a href="{% url 'core:settings_hub' %}" class="mobile-link text-sm">System Settings</a>
  <a href="{% url 'core:settings_clinic' %}" class="mobile-link text-sm">Clinic Settings</a>
  <a href="{% url 'core:settings_roles' %}" class="mobile-link text-sm">Role Settings</a>
  <a href="{% url 'core:settings_audit' %}" class="mobile-link text-sm">Settings Audit Log</a>
  <a href="{% url 'core:clinical_access_log' %}" class="mobile-link text-sm">Clinical Access Log</a>
  <a href="{% url 'appointments:appointment_type_settings' %}" class="mobile-link text-sm">Appointment Settings</a>
</div>
