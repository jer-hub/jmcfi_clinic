{% comment %}
  Profile / settings form section card.

  Context:
    title, description (optional), icon (FA class, optional)
    grid_class – Tailwind grid classes (optional)
{% endcomment %}
<section class="bg-white border border-gray-100 rounded-card mb-6">
  <header class="px-4 sm:px-6 py-4 border-b border-gray-50">
    <h3 class="text-base font-semibold text-gray-900 flex items-center gap-2">
      {% if icon %}<i class="fas {{ icon }} text-primary-500 text-sm" aria-hidden="true"></i>{% endif %}
      {{ title }}
    </h3>
    {% if description %}<p class="mt-1 text-sm text-gray-500">{{ description }}</p>{% endif %}
  </header>
  <div class="px-4 sm:px-6 py-5">
    <div class="{{ grid_class|default:'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6' }}">
