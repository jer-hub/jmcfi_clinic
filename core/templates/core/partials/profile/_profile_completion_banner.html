<!-- Profile Completion Card (if not complete) -->
        {% if completion_percentage < 100 %}
        <div class="mb-6 bg-gradient-to-r from-amber-50 to-orange-50 border-l-4 border-amber-400 rounded-lg shadow-md p-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <svg class="h-6 w-6 text-amber-500" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                        </svg>
                    </div>
                    <div class="ml-3">
                        <p class="text-sm font-medium text-amber-800">Profile {{ completion_percentage }}% complete</p>
                        <p class="text-xs text-amber-600">Complete your profile to access all features</p>
                    </div>
                </div>
                <div class="w-32 bg-amber-200 rounded-full h-2.5">
                    <div class="bg-amber-500 h-2.5 rounded-full transition-all duration-500" style="width: {{ completion_percentage }}%"></div>
                </div>
            </div>
        </div>
        {% endif %}
