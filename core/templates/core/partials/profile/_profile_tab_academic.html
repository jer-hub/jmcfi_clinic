{% load role_tags %}
<!-- Academic Information Tab (Students) -->
                        {% if user|is_patient_role %}
                        <div x-show="activeTab === 'academic'" x-cloak>
                            {% if profile %}
                            <div class="mb-3 flex justify-end">
                                <button type="button"
                                        @click="$dispatch('open-quick-edit', {field: 'academic_bundle', label: 'Academic Information', type: 'academic_bundle'})"
                                        class="inline-flex items-center px-3 py-2 text-xs font-semibold rounded-md bg-primary-600 text-white hover:bg-primary-700 transition-colors">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                                    </svg>
                                    Quick Edit Academic
                                </button>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="bg-gray-50/50 border border-gray-100 rounded-lg p-4">
                                    <div class="flex items-center justify-between">
                                        <label class="text-xs font-medium text-gray-500 uppercase tracking-wider">Course/Program</label>
                                    </div>
                                    <p class="text-gray-900 font-medium mt-1" data-profile-field="course">{{ profile.course|default:"Not specified" }}</p>
                                </div>
                                <div class="bg-gray-50/50 border border-gray-100 rounded-lg p-4">
                                    <div class="flex items-center justify-between">
                                        <label class="text-xs font-medium text-gray-500 uppercase tracking-wider">Year Level</label>
                                    </div>
                                    <p class="text-gray-900 font-medium mt-1" data-profile-field="year_level">{{ profile.year_level|default:"Not specified" }}</p>
                                </div>
                                <div class="bg-gray-50/50 border border-gray-100 rounded-lg p-4 sm:col-span-2">
                                    <div class="flex items-center justify-between">
                                        <label class="text-xs font-medium text-gray-500 uppercase tracking-wider">College/Department</label>
                                    </div>
                                    <p class="text-gray-900 font-medium mt-1" data-profile-field="department">{{ profile.department|default:"Not specified" }}</p>
                                </div>
                            </div>
                            {% else %}
                            <div class="text-center py-8">
                                <p class="text-gray-500">No academic information yet</p>
                            </div>
                            {% endif %}
                        </div>
                        {% endif %}
