{% comment %}
  Section heading for profile tab content.

  title (required), icon — FA class (optional), description (optional)
{% endcomment %}
<div class="{% if margin_top != False %}mb-4{% endif %}">
  <h3 class="text-sm font-semibold text-gray-900 flex items-center gap-2">
    {% if icon %}
    <span class="w-7 h-7 rounded-md bg-primary-50 border border-primary-100 flex items-center justify-center flex-shrink-0" aria-hidden="true">
      <i class="fas {{ icon }} text-primary-600 text-xs"></i>
    </span>
    {% endif %}
    {{ title }}
  </h3>
  {% if description %}
  <p class="text-sm text-gray-500 mt-1 {% if icon %}ml-9{% endif %}">{{ description }}</p>
  {% endif %}
</div>
