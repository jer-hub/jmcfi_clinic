{% comment %}
  Shared GET filters for academic catalog list pages.

  Required: filter_prefix, active_filter, clear_url
  Optional: show_search (truthy), search_q
{% endcomment %}
<form method="get" class="flex flex-wrap items-end gap-x-4 gap-y-3 flex-1 min-w-0">
  {% if show_search %}
  <div class="min-w-0 w-full sm:w-auto sm:min-w-[14rem] flex-1 max-w-md">
    <label for="{{ filter_prefix }}-search" class="block text-xs font-medium text-gray-700 mb-1">Search</label>
    <input id="{{ filter_prefix }}-search" type="search" name="q" value="{{ search_q|default:'' }}"
           placeholder="Search by name…"
           class="form-input form-input--compact w-full">
  </div>
  {% endif %}
  <div class="min-w-0 w-full sm:w-auto sm:min-w-[10rem]">
    <label for="{{ filter_prefix }}-active" class="block text-xs font-medium text-gray-700 mb-1">Status</label>
    <select id="{{ filter_prefix }}-active" name="active"
            class="form-select form-select--compact w-full">
      <option value="all" {% if active_filter == 'all' %}selected{% endif %}>All</option>
      <option value="1" {% if active_filter == '1' %}selected{% endif %}>Active only</option>
      <option value="0" {% if active_filter == '0' %}selected{% endif %}>Inactive only</option>
    </select>
  </div>
  <div class="flex flex-wrap items-center gap-2 w-full sm:w-auto">
    <button type="submit"
            class="inline-flex items-center px-4 py-2 bg-primary-600 text-white text-sm font-medium rounded-lg hover:bg-primary-700 transition-colors">
      Filter
    </button>
    {% if search_q or active_filter != 'all' %}
    <a href="{{ clear_url }}"
       class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 transition-colors">
      Clear
    </a>
    {% endif %}
  </div>
</form>
