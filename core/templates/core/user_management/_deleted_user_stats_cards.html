<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 px-3 sm:px-6 py-5 bg-white border-b border-gray-200">
  <div class="relative bg-gradient-to-br from-rose-50 to-rose-100/60 rounded-xl p-3.5 border border-rose-200/60 shadow-sm">
    <div class="flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-rose-700/80">Deleted</p>
        <p class="mt-1.5 text-2xl font-bold text-rose-900">{{ stats.deleted_users }}</p>
      </div>
      <div class="flex-shrink-0 p-2 rounded-lg bg-rose-100/80 text-rose-600">
        <i class="fas fa-box-archive text-lg"></i>
      </div>
    </div>
    <div class="mt-2.5 pt-2.5 border-t border-rose-200/40">
      <p class="text-[11px] text-rose-600/70 font-medium">Soft-deleted accounts</p>
    </div>
  </div>

  <a href="{% url 'core:user_management' %}"
     class="block relative group bg-gradient-to-br from-primary-50 to-primary-100/60 rounded-xl p-3.5 border border-primary-200/60 shadow-sm hover:shadow-md hover:border-primary-300 transition-all duration-200">
    <div class="flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-primary-700/80">Total</p>
        <p class="mt-1.5 text-2xl font-bold text-primary-900">{{ stats.total_users }}</p>
      </div>
      <div class="flex-shrink-0 p-2 rounded-lg bg-primary-100/80 text-primary-600">
        <i class="fas fa-users text-lg"></i>
      </div>
    </div>
    <div class="mt-2.5 pt-2.5 border-t border-primary-200/40">
      <p class="text-[11px] text-primary-600/70 font-medium">All registered users</p>
    </div>
  </a>

  <a href="{% url 'core:user_management' %}?status=active"
     class="block relative group bg-gradient-to-br from-green-50 to-green-100/60 rounded-xl p-3.5 border border-green-200/60 shadow-sm hover:shadow-md hover:border-green-300 transition-all duration-200">
    <div class="flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-green-700/80">Active</p>
        <p class="mt-1.5 text-2xl font-bold text-green-900">{{ stats.active_users }}</p>
      </div>
      <div class="flex-shrink-0 p-2 rounded-lg bg-green-100/80 text-green-600">
        <i class="fas fa-circle-check text-lg"></i>
      </div>
    </div>
    <div class="mt-2.5 pt-2.5 border-t border-green-200/40">
      <p class="text-[11px] text-green-600/70 font-medium">Currently active accounts</p>
    </div>
  </a>

  <a href="{% url 'core:user_management' %}?status=inactive"
     class="block relative group bg-gradient-to-br from-gray-50 to-gray-100/60 rounded-xl p-3.5 border border-gray-200/60 shadow-sm hover:shadow-md hover:border-gray-300 transition-all duration-200">
    <div class="flex items-start justify-between">
      <div class="flex-1 min-w-0">
        <p class="text-[11px] font-semibold uppercase tracking-wider text-gray-700/80">Inactive</p>
        <p class="mt-1.5 text-2xl font-bold text-gray-900">{{ stats.inactive_users }}</p>
      </div>
      <div class="flex-shrink-0 p-2 rounded-lg bg-gray-100/80 text-gray-600">
        <i class="fas fa-ban text-lg"></i>
      </div>
    </div>
    <div class="mt-2.5 pt-2.5 border-t border-gray-200/40">
      <p class="text-[11px] text-gray-600/70 font-medium">Suspended accounts</p>
    </div>
  </a>
</div>
