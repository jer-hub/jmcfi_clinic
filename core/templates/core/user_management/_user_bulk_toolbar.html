{% comment %}
  Bulk actions for active user list. Checkboxes in the table reference form="user-bulk-form".
  Requires Alpine userListBulk() on an ancestor element.
{% endcomment %}
<div class="border-b border-gray-200 grid [&>*]:col-start-1 [&>*]:row-start-1">
<div class="px-5 py-3 bg-gray-50/70"
     x-show="selectedCount === 0"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 -translate-y-1"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 -translate-y-1"
     x-cloak>
  <p class="text-sm text-gray-600">
    <i class="fas fa-square-check text-gray-400 mr-1.5" aria-hidden="true"></i>
    Select users with the checkboxes, then choose a bulk action below.
  </p>
</div>

<div class="px-5 py-3 bg-primary-50/60"
     x-show="selectedCount > 0"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-1"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 translate-y-0"
     x-transition:leave-end="opacity-0 translate-y-1"
     x-cloak>
  <form id="user-bulk-form"
        method="post"
        action="{% url 'core:user_bulk_action' %}{% if request.GET.urlencode %}?{{ request.GET.urlencode }}{% endif %}"
        hx-post="{% url 'core:user_bulk_action' %}{% if request.GET.urlencode %}?{{ request.GET.urlencode }}{% endif %}"
        hx-target="#user-table-container"
        hx-swap="innerHTML"
        hx-include="[form='user-bulk-form']"
        @submit="beforeBulkSubmit($event)"
        @htmx:config-request="onBulkConfigRequest($event)"
        @htmx:after-request="onBulkRequest($event)"
        class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    {% csrf_token %}
    <input type="hidden" name="confirmation" value="True">
    <p class="text-sm text-gray-700">
      <span class="font-semibold text-gray-900" x-text="selectedCount"></span>
      <span x-text="selectedCount === 1 ? 'user selected' : 'users selected'"></span>
    </p>
    <div class="flex flex-col sm:flex-row gap-2 sm:items-center flex-wrap">
      <label for="bulk_action" class="sr-only">Bulk action</label>
      <select id="bulk_action"
              name="action"
              x-model="bulkAction"
              class="block w-full sm:w-52 px-3 py-2 text-sm border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500">
        <option value="">More actions…</option>
        <option value="activate">Activate</option>
        <option value="deactivate">Deactivate</option>
        <option value="delete">Soft delete</option>
      </select>
      <button type="submit"
              :disabled="!bulkAction"
              :class="bulkAction === 'delete' ? 'bg-danger-600 hover:bg-danger-700 focus:ring-danger-500' : 'bg-primary-600 hover:bg-primary-700 focus:ring-primary-500'"
              class="inline-flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium rounded-lg text-white transition-colors focus:ring-2 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
        <i class="fas" :class="bulkAction === 'delete' ? 'fa-trash-can' : 'fa-check'" aria-hidden="true"></i>
        <span x-text="bulkAction === 'delete' ? 'Delete selected' : 'Apply'"></span>
      </button>
      <button type="button"
              @click="clearSelection()"
              class="inline-flex items-center justify-center gap-2 px-3 py-2 text-sm font-medium rounded-lg text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 transition-colors">
        Clear
      </button>
    </div>
  </form>
</div>
</div>
