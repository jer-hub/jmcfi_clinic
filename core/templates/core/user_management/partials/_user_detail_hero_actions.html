<div class="flex flex-wrap items-center justify-center sm:justify-end gap-2">
  {% if viewed_user.is_deleted %}
  <form method="POST" action="{% url 'core:user_restore' viewed_user.id %}" class="inline">
    {% csrf_token %}
    <button type="submit"
            class="inline-flex items-center px-3 py-2 text-sm font-medium rounded-lg text-emerald-900 bg-white hover:bg-white/90 shadow-sm transition-colors">
      <i class="fas fa-rotate-left mr-2"></i>
      Restore User
    </button>
  </form>
  {% else %}
  <a href="{% url 'core:user_edit' viewed_user.id %}"
     class="inline-flex items-center px-3 py-2 text-sm font-medium rounded-lg text-primary-700 bg-white hover:bg-white/90 shadow-sm transition-colors">
    <i class="fas fa-pen-to-square mr-2"></i>
    Edit User
  </a>
  <a href="{% url 'core:user_audit_log' viewed_user.id %}"
     class="inline-flex items-center px-3 py-2 text-sm font-medium rounded-lg text-white bg-white/10 border border-white/25 hover:bg-white/20 transition-colors">
    <i class="fas fa-clipboard-list mr-2 opacity-90"></i>
    View Audit Log
  </a>
  <a href="{% url 'core:patient_clinical_access_log' viewed_user.id %}"
     class="inline-flex items-center px-3 py-2 text-sm font-medium rounded-lg text-white bg-white/10 border border-white/25 hover:bg-white/20 transition-colors">
    <i class="fas fa-shield-heart mr-2 opacity-90"></i>
    Clinical Access
  </a>
  {% endif %}
</div>
