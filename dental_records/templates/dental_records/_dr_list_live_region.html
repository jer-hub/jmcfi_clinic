{% load role_tags %}
<div id="jmcfi-dr-list-stats" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6">
  {% include "dental_records/_dr_list_stat_cards_inner.html" %}
</div>

<div class="bg-white rounded-card shadow-sm border border-gray-200 overflow-hidden">
  <div class="px-5 py-4 border-b border-gray-100">
    <h3 class="text-base font-semibold text-gray-900 flex items-center gap-2">
      <i class="fas fa-filter text-primary-500"></i>Filter Records
    </h3>
  </div>
  <form method="GET"
        id="jmcfi-dr-list-filter-form"
        class="px-5 py-4 border-b border-gray-100 bg-gray-50/40 space-y-3"
        hx-get="{% url 'dental_records:dental_record_list' %}"
        hx-target="body"
        hx-swap="none"
        hx-push-url="true"
        hx-trigger="change from:select, change from:input[type=date], keyup changed delay:300ms from:input[type=text]"
        @submit.prevent>
    <div class="grid grid-cols-1 gap-3 {% if not user|is_patient_role %}md:grid-cols-2 lg:grid-cols-3{% else %}md:grid-cols-2{% endif %}">
      {% if not user|is_patient_role %}
        <div>
          <label for="search" class="block text-xs font-semibold text-gray-700 mb-1">Search Patient</label>
          <div class="relative">
            <i class="fas fa-magnifying-glass absolute inset-y-0 left-3 flex items-center text-gray-400 text-sm pointer-events-none my-auto h-full"></i>
            <input type="text" id="search" name="search" value="{{ search_query }}" autocomplete="off" class="block w-full pl-9 pr-3 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 text-sm" placeholder="Name or student ID">
          </div>
        </div>
      {% endif %}
      <div>
        <label for="date_from" class="block text-xs font-semibold text-gray-700 mb-1">From</label>
        <input type="date" id="date_from" name="date_from" value="{{ date_from }}" class="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 text-sm">
      </div>
      <div>
        <label for="date_to" class="block text-xs font-semibold text-gray-700 mb-1">To</label>
        <input type="date" id="date_to" name="date_to" value="{{ date_to }}" class="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 text-sm">
      </div>
    </div>
    <div class="flex justify-end">
      <a href="{% url 'dental_records:dental_record_list' %}" class="inline-flex items-center gap-2 px-4 py-2 border border-gray-300 text-sm font-medium rounded-lg text-gray-700 bg-white hover:bg-gray-50 transition-colors">
        <i class="fas fa-rotate-right"></i>Clear filters
      </a>
    </div>
  </form>

  <div id="jmcfi-dr-list-table-fragment">
    {% include "dental_records/_dr_list_table_fragment.html" %}
  </div>
</div>
