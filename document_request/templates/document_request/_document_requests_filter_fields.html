{% include "document_request/_document_requests_filter_hidden_fields.html" %}
<div class="flex flex-col gap-3 lg:flex-row lg:items-end lg:gap-4">
  {% if user.role != 'student' %}
  <div class="flex-1 min-w-0">
    <label for="doc_search" class="block text-xs font-semibold text-gray-700 mb-1">Search</label>
    <input type="search" id="doc_search" name="search" value="{{ current_search }}"
           placeholder="Name, email, student ID, purpose…"
           class="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 text-sm"
           hx-get="{% url 'document_request:document_requests' %}"
           hx-target="body"
           hx-swap="none"
           hx-push-url="true"
           hx-trigger="input changed delay:300ms"
           hx-include="#jmcfi-doc-list-filter-form">
  </div>
  {% endif %}
  <div class="grid grid-cols-2 gap-3 sm:flex sm:items-end sm:gap-3">
    <div class="sm:w-40">
      <label for="doc_date_from" class="block text-xs font-semibold text-gray-700 mb-1">From</label>
      <input type="date" id="doc_date_from" name="date_from" value="{{ filter_date_from }}"
             class="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 text-sm">
    </div>
    <div class="sm:w-40">
      <label for="doc_date_to" class="block text-xs font-semibold text-gray-700 mb-1">To</label>
      <input type="date" id="doc_date_to" name="date_to" value="{{ filter_date_to }}"
             class="block w-full px-3 py-2 border border-gray-300 rounded-lg bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500 text-sm">
    </div>
    <div class="col-span-2 sm:col-span-1 flex sm:pb-0.5">
      <a href="{% url 'document_request:document_requests' %}"
         class="inline-flex w-full sm:w-auto items-center justify-center gap-2 px-4 py-2 border border-gray-300 text-sm font-medium rounded-lg text-gray-700 bg-white hover:bg-gray-50 transition-colors whitespace-nowrap">
        <i class="fas fa-rotate-right" aria-hidden="true"></i>Clear
      </a>
    </div>
  </div>
</div>
