{# ── Single form field rendered with Tailwind classes ── #}
{% if field.is_hidden %}
  {{ field }}
{% else %}
<div data-field-wrapper class="{% if field.errors %}has-error{% endif %} {% if field.field.widget.attrs.rows %}md:col-span-2{% endif %}">
  {% if field.label %}
  <label for="{{ field.id_for_label }}"
         class="block text-sm font-medium text-gray-700 mb-1">
    {{ field.label }}
    {% if field.field.required %}<span class="text-red-500">*</span>{% endif %}
  </label>
  {% endif %}
  {{ field }}
  {% if field.help_text %}
  <p class="mt-1 text-xs text-gray-400">{{ field.help_text }}</p>
  {% endif %}
  {% if field.errors %}
  <p class="mt-1 text-xs text-red-600 font-medium">{{ field.errors.0 }}</p>
  {% endif %}
</div>
{% endif %}
