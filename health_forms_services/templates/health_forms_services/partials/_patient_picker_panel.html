{# Patient search + selection card. Parent must wrap with hfPatientPicker x-data. #}
<div class="rounded-md border border-gray-200 bg-gray-50/40 p-3">
  <div class="flex items-center gap-2">
    <i class="fas fa-user-check text-primary-600 text-sm" aria-hidden="true"></i>
    <h3 class="text-sm font-semibold text-gray-900">Patient Selection</h3>
  </div>
  <p class="mt-1 text-xs text-gray-600">Search an existing patient to auto-fill demographics and contact details.</p>

  <div class="mt-2">
    <div class="relative">
      <input type="text"
             x-model="query"
             @input.debounce.300ms="searchPatients()"
             @keydown.enter.prevent
             placeholder="Search by name, email, or patient ID"
             class="form-input text-sm"
             autocomplete="off">
      <div x-show="loading" class="absolute inset-y-0 right-3 flex items-center text-xs text-gray-500">Searching...</div>
    </div>
    <div x-show="!loading && query.trim().length >= 2 && !results.length"
         x-cloak
         class="mt-2 rounded-lg border border-gray-200 bg-gray-50 px-3 py-2 text-xs text-gray-600">
      No matching patients found.
    </div>
    <div x-show="results.length > 0"
         x-cloak
         class="mt-2 max-h-52 overflow-y-auto rounded-lg border border-gray-200 bg-white shadow-sm z-10">
      <template x-for="item in results" :key="item.id">
        <button type="button"
                @click="selectPatient(item)"
                class="w-full px-3 py-2 text-left hover:bg-primary-50 border-b border-gray-100 last:border-b-0">
          <p class="text-sm font-medium text-gray-900" x-text="item.name"></p>
          <p class="text-xs text-gray-500" x-text="`${item.patient_id || item.email} · ${item.detail}`"></p>
        </button>
      </template>
    </div>
  </div>

  <div x-show="selectedPatient" class="mt-3 flex items-center justify-between gap-3 rounded-lg border border-primary-200 bg-primary-50 px-3 py-2.5">
    <div class="min-w-0">
      <p class="text-sm font-semibold text-primary-900" x-text="selectedPatient?.name"></p>
      <p class="text-xs text-primary-700" x-text="selectedPatient?.patientId || selectedPatient?.email"></p>
    </div>
    <button type="button" @click="clearSelected()" class="text-xs font-medium text-primary-700 hover:text-primary-900">Change</button>
  </div>
  <input type="hidden" name="selected_user_id" :value="selectedPatient?.id || ''">
</div>
