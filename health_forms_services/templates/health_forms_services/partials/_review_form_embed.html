{# Embedded markup copied into Alpine modal (# via embedFrom). Expects review_url_name, form_obj #}
<form method="post" action="{% url review_url_name form_obj.pk %}" class="space-y-4 text-left">
  {% csrf_token %}
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
    <select name="status"
            class="w-full px-3 py-2.5 sm:py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 text-sm">
      <option value="completed" {% if form_obj.status == 'completed' %}selected{% endif %}>Completed</option>
      <option value="incomplete" {% if form_obj.status == 'incomplete' %}selected{% endif %}>Incomplete</option>
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Review Notes</label>
    <textarea name="review_notes" rows="3"
              class="w-full px-3 py-2.5 sm:py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 text-sm"
              placeholder="Optional notes..."></textarea>
  </div>
</form>
