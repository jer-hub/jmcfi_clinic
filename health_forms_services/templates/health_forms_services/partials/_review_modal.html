<div x-data="reviewModal()"
     x-cloak
     @keydown.escape.window="closeModal()">
  <template x-teleport="body">
    <div x-show="isOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="fixed inset-0 z-50 overflow-y-auto"
         role="dialog"
         aria-modal="true"
         :aria-labelledby="'review-modal-title'">
      <div class="flex items-center justify-center min-h-screen p-3 sm:p-4">
        <div class="fixed inset-0 bg-gray-900/50 backdrop-blur-[2px] transition-opacity"
             @click="closeModal()"
             aria-hidden="true"></div>

        <div x-show="isOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
             x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
             @click.outside="closeModal()"
             class="relative bg-white rounded-2xl shadow-2xl max-w-md w-full mx-auto transform transition-all p-5 sm:p-6">
          <button type="button" @click="closeModal()"
                  class="absolute top-3 right-3 text-gray-400 hover:text-gray-600 p-1">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>

          <h3 id="review-modal-title" class="text-lg font-semibold text-gray-900 mb-4">Review Form</h3>

          <form method="post" :action="actionUrl">
            {% csrf_token %}
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                <select name="status" x-model="selectedStatus"
                        class="w-full px-3 py-2.5 sm:py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 text-sm">
                  <option value="completed">Completed</option>
                  <option value="incomplete">Incomplete</option>
                </select>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Review Notes</label>
                <textarea name="review_notes" rows="3"
                          class="w-full px-3 py-2.5 sm:py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 text-sm"
                          placeholder="Optional notes..."></textarea>
              </div>
            </div>
            <div class="mt-6 flex flex-col-reverse sm:flex-row justify-end gap-2 sm:gap-3">
              <button type="button" @click="closeModal()"
                      class="w-full sm:w-auto px-4 py-2.5 sm:py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm">Cancel</button>
              <button type="submit"
                      class="w-full sm:w-auto px-4 py-2.5 sm:py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 text-sm font-medium">Submit Review</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
// Expose modal control globally so onclick handlers can open it
var reviewModalState = null;

function reviewModal() {
  return {
    isOpen: false,
    selectedStatus: '{{ form_obj.status|default:"completed" }}',
    actionUrl: '{% if review_url_name %}{% url review_url_name form_obj.pk %}{% endif %}',

    init() {
      reviewModalState = this;
    },

    openModal(opts) {
      if (opts && opts.status) this.selectedStatus = opts.status;
      this.isOpen = true;
    },

    closeModal() {
      this.isOpen = false;
    }
  };
}

function openReviewModal() {
  if (reviewModalState) {
    reviewModalState.openModal({ status: '{{ form_obj.status|default:"completed" }}' });
  }
}
</script>
