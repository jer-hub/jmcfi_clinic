{% load static %}
<div class="space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
    <span class="inline-flex items-center px-3 py-1.5 text-xs font-semibold text-primary-700 bg-primary-50 rounded-full border border-primary-200">
      {{ tip.get_category_display }}
    </span>
    <span class="text-xs sm:text-sm text-gray-600 font-medium">{{ tip.created_at|date:"M d, Y" }}</span>
  </div>
  <div class="text-sm sm:text-base text-gray-700 leading-relaxed whitespace-pre-line max-h-60 sm:max-h-80 lg:max-h-96 overflow-y-auto">
    {{ tip.content|linebreaks }}
  </div>
  <div class="flex items-center pt-3 border-t border-gray-100">
    <div class="w-8 h-8 bg-gradient-to-br from-primary-400 to-primary-600 rounded-full flex items-center justify-center flex-shrink-0 mr-3">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <div class="min-w-0 flex-1">
      <p class="text-sm font-medium text-gray-700">By Dr. {{ tip.created_by.get_full_name }}</p>
      <p class="text-xs text-gray-500">Medical Expert</p>
    </div>
  </div>
</div>
