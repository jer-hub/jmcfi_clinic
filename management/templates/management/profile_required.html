{% extends 'management/base.html' %}

{% block title %}Profile Setup Required - JMCFI Clinic{% endblock title %}

{% block content %}
<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <!-- Icon -->
        <div class="text-center">
            <div class="mx-auto h-20 w-20 flex items-center justify-center rounded-full bg-blue-100">
                <svg class="h-12 w-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
            </div>
        </div>

        <!-- Heading -->
        <div class="text-center">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">
                Profile Setup Required
            </h2>
            <p class="text-gray-600">
                Complete your profile to access the clinic management system
            </p>
        </div>

        <!-- Action -->
        <div class="space-y-4">
            <a href="{% url 'management:edit_profile' %}" 
               class="w-full flex justify-center items-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                Complete Profile
            </a>
            
            <div class="text-center">
                <a href="{% url 'account_logout' %}" class="text-sm text-gray-500 hover:text-gray-700">
                    Sign out instead
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
