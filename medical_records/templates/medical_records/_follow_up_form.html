<form hx-post="{{ post_url }}"
      hx-target="#follow-up-error"
      hx-swap="innerHTML"
      class="space-y-4">
    {% csrf_token %}
    <div id="follow-up-error" class="space-y-2" aria-live="polite"></div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Follow-up Date</label>
        <input type="date" name="follow_up_date" required
               min="{{ min_date }}"
               class="block w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Follow-up Time</label>
        <select name="follow_up_time" required
                class="block w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500">
            <option value="">Select time</option>
            <optgroup label="Morning">
                <option value="09:00">9:00 AM</option>
                <option value="09:30">9:30 AM</option>
                <option value="10:00">10:00 AM</option>
                <option value="10:30">10:30 AM</option>
                <option value="11:00">11:00 AM</option>
                <option value="11:30">11:30 AM</option>
            </optgroup>
            <optgroup label="Afternoon">
                <option value="14:00">2:00 PM</option>
                <option value="14:30">2:30 PM</option>
                <option value="15:00">3:00 PM</option>
                <option value="15:30">3:30 PM</option>
                <option value="16:00">4:00 PM</option>
                <option value="16:30">4:30 PM</option>
            </optgroup>
        </select>
    </div>
    <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Reason</label>
        <input type="text" name="follow_up_reason"
               class="block w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:ring-primary-500 focus:border-primary-500"
               placeholder="e.g., Check progress, Lab review">
    </div>
</form>
