{% load user_filters %}
{% comment %}
  Alpine patient search for walk-in medical record create.
  On select, navigates to create-for-patient?patient=<id>.
{% endcomment %}
<div class="bg-white rounded-card border border-gray-200 shadow-sm p-5 sm:p-6"
     data-student-id="{% if student %}{{ student.id }}{% endif %}"
     data-student-name="{% if student %}{{ student|format_student_name|escape }}{% endif %}"
     data-student-email="{% if student %}{{ student.email|escape }}{% endif %}"
     x-data="medicalRecordPatientPicker()"
     x-init="initFromDom()">
  <div class="flex items-center gap-2 mb-4 pb-2 border-b border-gray-200">
    <i class="fas fa-search text-primary-600 text-sm"></i>
    <h2 class="text-sm font-semibold text-gray-800 uppercase tracking-wider">Select a patient</h2>
  </div>
  <p class="text-sm text-gray-600 mb-4">Search by name, email, or patient ID. You will complete the clinical form after choosing a patient.</p>

  <div class="relative">
    <label class="block text-sm font-medium text-gray-700 mb-2" for="medical-patient-search">
      <i class="fas fa-magnifying-glass mr-1 text-gray-400"></i> Search patients
      <span class="ml-1 text-xs text-gray-400 font-normal">(min. 2 characters)</span>
    </label>
    <div class="relative">
      <input type="text"
             id="medical-patient-search"
             x-ref="searchInput"
             x-model="query"
             @input.debounce.300ms="searchPatients()"
             @focus="if (results.length && query.trim().length >= 2) showResults = true"
             @keydown.escape="showResults = false"
             placeholder="Name, email, or patient ID…"
             autocomplete="off"
             class="form-input pr-11">
      <div x-show="loading" class="absolute right-4 top-3 pointer-events-none" x-cloak>
        <i class="fas fa-spinner fa-spin text-primary-600"></i>
      </div>
    </div>

    <div x-show="showResults"
         x-transition
         @click.outside="showResults = false"
         x-cloak
         x-ref="resultsList"
         class="absolute z-50 left-0 right-0 mt-1 bg-white rounded-lg shadow-xl border border-gray-200 max-h-72 overflow-y-auto">
      <template x-if="results.length === 0 && !loading">
        <div class="p-6 text-center">
          <i class="fas fa-user-slash text-3xl text-gray-300 mb-2"></i>
          <p class="text-sm font-medium text-gray-600">No patients found</p>
        </div>
      </template>
      <template x-if="results.length > 0">
        <div>
          <div class="px-4 py-2 bg-gray-50 border-b border-gray-100 sticky top-0">
            <p class="text-xs font-semibold text-gray-500 uppercase">
              <span x-text="results.length"></span> result(s)
            </p>
          </div>
          <template x-for="(row, idx) in results" :key="row.id">
            <button type="button"
                    :data-idx="idx"
                    @click="selectPatient(row)"
                    class="w-full text-left p-3 hover:bg-primary-50 border-b border-gray-50 last:border-b-0 flex items-center gap-3 transition-colors focus:outline-none focus:bg-primary-50">
              <span class="inline-flex w-10 h-10 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 text-white text-sm font-semibold flex-shrink-0 items-center justify-center"
                    x-text="(row.name || '?').charAt(0).toUpperCase()"></span>
              <span class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate" x-text="row.name"></p>
                <p class="text-xs text-gray-500 truncate" x-text="row.email"></p>
                <p class="text-xs text-gray-400" x-show="row.patientId" x-text="'ID: ' + row.patientId"></p>
              </span>
            </button>
          </template>
        </div>
      </template>
    </div>
  </div>
</div>
