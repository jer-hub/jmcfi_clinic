{% extends 'core/base.html' %}
{% block title %}Batch Inventory – Pharmacy{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 pt-0 pb-8 sm:pb-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    {% include 'pharmacy/_subnav.html' %}
    <div class="bg-white rounded-lg shadow-lg overflow-hidden">

      <div class="bg-gradient-to-r from-primary-50 to-primary-100 px-6 py-5 sm:px-8">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-primary-500 to-primary-700 rounded-xl flex items-center justify-center shadow-lg">
              <i class="fas fa-boxes-stacked text-white text-xl"></i>
            </div>
            <div>
              <h1 class="text-2xl font-bold text-gray-900">Batch Inventory</h1>
              <p class="text-sm text-gray-600 mt-1">Track medicine batches and expiry dates</p>
            </div>
          </div>
          <a href="{% url 'pharmacy:batch_create' %}" class="inline-flex items-center px-4 py-2 bg-primary-600 text-white text-sm font-medium rounded-lg hover:bg-primary-700 transition-colors shadow-sm">
            <i class="fas fa-plus mr-2"></i>Add Batch
          </a>
        </div>
      </div>

      <div class="bg-gray-50/50 px-6 py-4 border-b border-gray-200">
        <form method="get"
              class="flex flex-col sm:flex-row gap-3"
              hx-get="{% url 'pharmacy:batch_list' %}"
              hx-target="body"
              hx-swap="none"
              hx-push-url="true"
              hx-trigger="change from:select, keyup changed delay:300ms from:input[type=text]"
              @submit.prevent>
          <div class="flex-1">
            <input type="text" name="q" value="{{ search_query }}" placeholder="Search by batch # or medicine name..."
                   class="w-full border border-gray-300 rounded-lg shadow-sm px-4 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
          </div>
          <div class="w-full sm:w-48">
            <select name="status" class="w-full border border-gray-300 rounded-lg shadow-sm px-4 py-2 text-sm focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
              <option value="">All Statuses</option>
              <option value="ok" {% if selected_status == 'ok' %}selected{% endif %}>Valid</option>
              <option value="near_expiry" {% if selected_status == 'near_expiry' %}selected{% endif %}>Near Expiry</option>
              <option value="expired" {% if selected_status == 'expired' %}selected{% endif %}>Expired</option>
            </select>
          </div>
          <a href="{% url 'pharmacy:batch_list' %}" class="inline-flex items-center px-4 py-2 text-sm text-gray-600 hover:text-gray-800 border border-gray-300 rounded-lg bg-white">
            <i class="fas fa-rotate-right mr-1"></i>Clear
          </a>
        </form>
      </div>

      <div id="jmcfi-pharm-batch-list-table">
        {% include 'pharmacy/_batch_list_table_fragment.html' %}
      </div>

    </div>
  </div>
</div>
{% endblock %}
