{% comment %}
  Patient search picker for dispensing — posts hidden name="patient".
  Parent form must include selected_patient and patient_search_url in context.
{% endcomment %}
<div class="relative" x-data="dispensingPatientPicker()" x-init="initFromContext()">
  <div x-show="!selectedPatient">
    <label for="dispensing-patient-search" class="block text-sm font-medium text-gray-700 mb-2">
      <i class="fas fa-magnifying-glass mr-1 text-gray-400"></i>
      Search patients
      <span class="ml-1 text-xs text-gray-400 font-normal">(min. 2 characters)</span>
    </label>
    <div class="relative">
      <input type="text"
             id="dispensing-patient-search"
             x-ref="searchInput"
             x-model="query"
             @input.debounce.300ms="searchPatients()"
             @keydown.escape="showResults = false"
             placeholder="Name, email, or patient ID…"
             autocomplete="off"
             class="form-input pr-11">
      <div x-show="loading" class="absolute right-4 top-3 pointer-events-none" x-cloak>
        <i class="fas fa-spinner fa-spin text-primary-600"></i>
      </div>
    </div>

    <div x-show="showResults"
         x-transition
         @click.outside="showResults = false"
         x-cloak
         class="absolute z-50 left-0 right-0 mt-1 bg-white rounded-lg shadow-xl border border-gray-200 max-h-72 overflow-y-auto">
      <template x-if="results.length === 0 && !loading && query.trim().length >= 2">
        <div class="p-6 text-center">
          <i class="fas fa-user-slash text-3xl text-gray-300 mb-2"></i>
          <p class="text-sm font-medium text-gray-600">No patients found</p>
        </div>
      </template>
      <template x-if="results.length > 0">
        <div>
          <div class="px-4 py-2 bg-gray-50 border-b border-gray-100 sticky top-0">
            <p class="text-xs font-semibold text-gray-500 uppercase">
              <span x-text="results.length"></span> result(s)
            </p>
          </div>
          <template x-for="row in results" :key="row.id">
            <button type="button"
                    @click="selectPatient(row)"
                    class="w-full text-left p-3 hover:bg-primary-50 border-b border-gray-50 last:border-b-0 flex items-center gap-3 transition-colors focus:outline-none focus:bg-primary-50">
              <span class="inline-flex w-10 h-10 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 text-white text-sm font-semibold flex-shrink-0 items-center justify-center"
                    x-text="(row.name || '?').charAt(0).toUpperCase()"></span>
              <span class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-900 truncate" x-text="row.name"></p>
                <p class="text-xs text-gray-500 truncate" x-text="row.email"></p>
                <p class="text-xs text-gray-400" x-show="row.patient_id" x-text="'ID: ' + row.patient_id"></p>
              </span>
            </button>
          </template>
        </div>
      </template>
    </div>
  </div>

  <div x-show="selectedPatient"
       x-cloak
       class="flex items-center justify-between gap-3 rounded-lg border border-primary-200 bg-primary-50 px-4 py-3">
    <div class="flex items-center gap-3 min-w-0">
      <span class="inline-flex w-10 h-10 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 text-white text-sm font-semibold flex-shrink-0 items-center justify-center"
            x-text="(selectedPatient?.name || '?').charAt(0).toUpperCase()"></span>
      <div class="min-w-0">
        <p class="text-sm font-semibold text-primary-900 truncate" x-text="selectedPatient?.name"></p>
        <p class="text-xs text-primary-700 truncate" x-text="selectedPatient?.patient_id || selectedPatient?.email"></p>
      </div>
    </div>
    <button type="button"
            @click="clearPatient()"
            class="text-xs font-medium text-primary-700 hover:text-primary-900 whitespace-nowrap">
      Change
    </button>
  </div>

  <input type="hidden" name="patient" id="id_patient" :value="selectedPatient?.id || ''">
  {% if form.patient.errors %}
  {% for error in form.patient.errors %}
  <p class="mt-1 text-xs text-red-600">{{ error }}</p>
  {% endfor %}
  {% endif %}
</div>
