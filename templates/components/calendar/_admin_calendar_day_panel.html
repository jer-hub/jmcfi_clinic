{% comment %}
  Selected-day details for admin analytics heat map (Alpine-driven).
{% endcomment %}
<div id="admin-cal-day-panel"
     class="mt-4 rounded-xl border border-gray-200 bg-gray-50/60 overflow-hidden"
     aria-labelledby="admin-cal-day-heading">
  <div class="px-4 py-3 border-b border-gray-200 bg-white">
    <h3 id="admin-cal-day-heading" class="text-sm font-semibold text-gray-900">
      <template x-if="selectedDay().is_today">
        <span><span class="text-primary-600">Today</span><span class="text-gray-400 font-normal"> · </span></span>
      </template>
      <span x-text="selectedDay().label"></span>
    </h3>
    <p class="mt-0.5 text-xs text-gray-500" x-text="scheduleSummary(selectedDay())"></p>
  </div>

  <div x-show="selectedDay().status_summary?.length"
       class="px-4 py-2.5 border-b border-gray-200 bg-white flex flex-wrap gap-2"
       role="group"
       aria-label="Status breakdown">
    <template x-for="row in selectedDay().status_summary" :key="row.status">
      <span :class="badgeClasses(row.variant)" x-text="row.label"></span>
    </template>
  </div>

  <div class="p-4">
    <template x-if="hasDayItems(selectedDay()) && (selectedDay().events?.length)">
      <ul class="space-y-2 max-h-[min(22rem,50vh)] overflow-y-auto pr-1" role="list">
        <template x-for="(event, idx) in selectedDay().events" :key="idx">
          <li role="listitem">
            <a :href="event.detail_url"
               class="group block rounded-xl border transition-all focus:outline-none focus-visible:ring-2 focus-visible:ring-primary-500 focus-visible:ring-offset-1"
               :class="eventCardClasses(event)"
               :aria-label="event.title + (event.event_kind !== 'document' ? ', ' + event.time_label + ', ' + event.status_label : '')">
              <div class="flex items-stretch gap-0 min-h-[4.25rem]">
                <div class="flex flex-col items-center justify-center w-[3.25rem] flex-shrink-0 border-r tabular-nums px-1"
                     :class="eventTimeClasses(event) + (event.is_cancelled ? ' opacity-80' : '')">
                  <template x-if="event.event_kind === 'document'">
                    <span class="flex flex-col items-center">
                      <i class="fas fa-file-circle-question text-sm" aria-hidden="true"></i>
                      <span class="text-[9px] font-semibold mt-0.5">Doc</span>
                    </span>
                  </template>
                  <template x-if="event.event_kind !== 'document'">
                    <span class="text-[11px] font-bold leading-tight text-center" x-text="event.time_label"></span>
                  </template>
                </div>
                <div class="flex-1 min-w-0 py-2.5 pl-3 pr-2 flex flex-col justify-center gap-1">
                  <div class="flex items-start justify-between gap-2 min-w-0">
                    <p class="text-sm font-semibold leading-snug truncate"
                       :class="event.is_cancelled ? 'text-gray-500 line-through decoration-gray-400' : 'text-gray-900'"
                       x-text="event.title"></p>
                    <i class="fas fa-chevron-right text-[10px] text-gray-300 group-hover:text-primary-500 flex-shrink-0 mt-1 transition-colors"
                       aria-hidden="true"></i>
                  </div>
                  <div class="flex flex-wrap items-center gap-x-2 gap-y-1 min-w-0">
                    <span class="text-xs truncate min-w-0"
                          :class="event.is_cancelled ? 'text-gray-400' : 'text-gray-600'">
                      <template x-if="event.meta_prefix">
                        <span class="text-gray-400" x-text="event.meta_prefix + ' '"></span>
                      </template>
                      <span x-text="event.meta_line"></span>
                    </span>
                    <span :class="badgeClasses(event.variant)" x-text="event.status_label"></span>
                  </div>
                </div>
              </div>
            </a>
          </li>
        </template>
      </ul>
    </template>
    <template x-if="hasDayItems(selectedDay()) && !(selectedDay().events?.length)">
      <p class="text-sm text-gray-600 text-center py-6" x-text="scheduleSummary(selectedDay())"></p>
    </template>
    <template x-if="!hasDayItems(selectedDay())">
      <div class="flex flex-col items-center justify-center text-center py-8 px-4 rounded-lg border border-dashed border-gray-200 bg-white">
        <span class="inline-flex items-center justify-center w-10 h-10 rounded-lg bg-gray-50 border border-gray-200 text-gray-400 mb-2">
          <i class="fas fa-calendar-day" aria-hidden="true"></i>
        </span>
        <p class="text-sm font-medium text-gray-700">Nothing scheduled</p>
        <p class="mt-0.5 text-xs text-gray-500">No appointments or pending document requests on this day.</p>
      </div>
    </template>
  </div>
</div>
